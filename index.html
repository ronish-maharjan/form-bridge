<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MailBridge Test</title>
</head>
<body>

    <h2>Login</h2>

    <form id="login-form">
        <input
            type="email"
            name="email"
            placeholder="Email"
            required
        />

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        />

        <br><br>

        <button type="submit">
            Login
        </button>
    </form>

    <hr>

    <h2>Protected Request</h2>

    <button id="getApis">
        GET /api/v1/apis
    </button>

    <hr>

    <h3>Response</h3>

    <pre id="result"></pre>

    <script>
        const result = document.getElementById("result");

        // Login
        document
            .getElementById("login-form")
            .addEventListener("submit", async (e) => {
                e.preventDefault();

                const form = new FormData(e.target);

                const body = {
                    email: form.get("email"),
                    password: form.get("password"),
                };

                try {
                    const response = await fetch(
                        "http://localhost:3000/api/v1/auth/login",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            credentials: "include",
                            body: JSON.stringify(body),
                        }
                    );

                    const data = await response.json();

                    result.textContent =
                        "LOGIN\n\n" +
                        JSON.stringify(data, null, 2);

                } catch (err) {
                    console.error(err);
                }
            });

        // Protected GET
        document
            .getElementById("getApis")
            .addEventListener("click", async () => {

                try {
                    const response = await fetch(
                        "http://localhost:3000/api/v1/apis",
                        {
                            method: "GET",
                            credentials: "include",
                        }
                    );

                    const data = await response.json();

                    result.textContent =
                        "GET /api/v1/apis\n\n" +
                        JSON.stringify(data, null, 2);

                } catch (err) {
                    console.error(err);
                }
            });
    </script>

</body>
</html>
